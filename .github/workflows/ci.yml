name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: make install-dev

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test

      - name: Compile Kubeflow Pipeline
        run: make compile-pipeline

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: false
          tags: active-fed-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Aggregator Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.aggregator
          push: false
          tags: active-fed-aggregator:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
