apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-runner
  namespace: active-fed

---
# Allows pipeline pods to manage PyTorchJobs + Pods
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: active-fed-pipeline-role
rules:
  - apiGroups: ["kubeflow.org"]
    resources: ["pytorchjobs"]
    verbs: ["get", "list", "create", "delete", "patch", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: active-fed-pipeline-binding
subjects:
  - kind: ServiceAccount
    name: pipeline-runner
    namespace: active-fed
  - kind: ServiceAccount
    name: pipeline-runner
    namespace: kubeflow
roleRef:
  kind: ClusterRole
  name: active-fed-pipeline-role
  apiGroup: rbac.authorization.k8s.io
